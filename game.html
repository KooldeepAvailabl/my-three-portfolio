<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TPS Shooter - Portfolio Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #000; overflow: hidden; }
    #game-canvas { display: block; width: 100vw; height: 100vh; }
    #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
    #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #0f0; font-size: 2rem; font-weight: bold; text-shadow: 0 0 10px #0f0; }
    #health-bar { position: absolute; bottom: 30px; left: 30px; width: 200px; height: 30px; background: rgba(0,0,0,0.7); border: 2px solid #0f0; border-radius: 5px; overflow: hidden; }
    #health-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #0f0, #0a0); transition: width 0.3s; }
    #score { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 1.5rem; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 5px; border: 2px solid #0f0; }
    #ammo { position: absolute; bottom: 30px; right: 30px; color: #fff; font-size: 1.5rem; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 5px; }
    #back-btn { position: absolute; top: 20px; left: 20px; padding: 10px 20px; background: rgba(255,0,0,0.8); color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; pointer-events: all; }
    #back-btn:hover { background: rgba(255,0,0,1); }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="ui">
    <button id="back-btn" onclick="window.location.href='index.html'">← Back</button>
    <div id="crosshair">+</div>
    <div id="health-bar"><div id="health-fill"></div></div>
    <div id="score">Score: 0</div>
    <div id="ammo">∞</div>
  </div>
  <script type="module" src="/src/tps-game/TPSGame.js"></script>
</body>
</html>
